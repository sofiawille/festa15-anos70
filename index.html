<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sofia 15 Anos | Festa Groovy Anos 70</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bungee&family=DM+Sans:wght@400;500;700&family=Fugaz+One&family=Pacifico&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              groovy: {
                bg: '#1B1212',
                cream: '#F4E4C1',
                orange: '#FF6B35',
                mustard: '#FFB627',
                red: '#D7263D',
                purple: '#6A4C93',
                brown: '#8B4513',
              }
            },
            fontFamily: {
              sans: ['"DM Sans"', 'sans-serif'],
              groovy: ['"Bungee"', 'cursive'],
              funk: ['"Fugaz One"', 'sans-serif'],
              retro: ['"Alfa Slab One"', 'serif'],
              cursive: ['"Pacifico"', 'cursive'],
            },
            animation: {
              'spin-slow': 'spin 8s linear infinite',
              'spin-slower': 'spin 30s linear infinite',
              'spin-reverse': 'spin-reverse 12s linear infinite',
              'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'wave': 'wave 6s ease-in-out infinite',
              'sway': 'sway 4s ease-in-out infinite',
            },
            keyframes: {
              'spin-reverse': {
                '0%': { transform: 'rotate(360deg)' },
                '100%': { transform: 'rotate(0deg)' },
              },
              'wave': {
                '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                '50%': { transform: 'translateY(-8px) rotate(2deg)' },
              },
              'sway': {
                '0%, 100%': { transform: 'rotate(-3deg)' },
                '50%': { transform: 'rotate(3deg)' },
              },
            },
            boxShadow: {
              'glow-orange': '0 0 20px #FF6B35, 0 0 40px rgba(255,107,53,0.4)',
              'glow-mustard': '0 0 20px #FFB627, 0 0 40px rgba(255,182,39,0.4)',
              'glow-purple': '0 0 20px #6A4C93, 0 0 40px rgba(106,76,147,0.4)',
              'glow-red': '0 0 15px #D7263D, 0 0 30px rgba(215,38,61,0.3)',
              'cream-soft': '0 0 5px #F4E4C1',
            }
          }
        }
      }
    </script>
    <style>
      html {
        scroll-behavior: smooth;
        scroll-padding-top: 5rem;
      }
      body {
        background-color: #1B1212;
        color: #F4E4C1;
        overflow-x: hidden;
      }
      .grain-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 50;
        background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.8%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22 opacity=%220.06%22/%3E%3C/svg%3E');
      }
      ::-webkit-scrollbar { width: 10px; }
      ::-webkit-scrollbar-track { background: #1B1212; }
      ::-webkit-scrollbar-thumb { background: #FF6B35; border-radius: 5px; }
      ::-webkit-scrollbar-thumb:hover { background: #FFB627; }
      .text-layered {
        text-shadow: 2px 2px 0px #D7263D, 4px 4px 0px #6A4C93;
      }
      .sunburst-bg {
        background: repeating-conic-gradient(
          from 0deg,
          #FF6B35 0deg 15deg,
          #FFB627 15deg 30deg
        );
      }
      .vinyl-grooves {
        background:
          repeating-radial-gradient(circle, #0a0a0a 0px, #0a0a0a 1px, #1a1a1a 2px, #1a1a1a 4px),
          radial-gradient(circle, #0a0a0a, #000);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div class="grain-overlay"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
